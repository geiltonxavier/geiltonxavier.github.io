baseURL = 'https://geiltonxavier.com.br'
languageCode = 'en-us'
title = 'Geilton Xavier'
theme = 'typo'

[taxonomies]
tag = 'tags'

[params]
# Home meta description
description = "A tech-oriented personal blog curated by Geilton Xavier."

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content in markdown
homeIntroTitle = ''
homeIntroContent = """
{{< rawhtml >}}
<div class="home-bio">
  <figure class="bio-portrait">
    <img src="/img/geilton-avatar.jpeg" alt="Geilton Xavier" loading="lazy">
  </figure>
  <p><strong>Geilton Xavier</strong> is a <strong>Software Engineer</strong> with a passion for <strong>distributed systems</strong> &amp; <strong>software architecture</strong>.</p>
  <p>He specializes in designing scalable platforms, modernizing engineering practices, and building systems that remain reliable under real operational pressure.</p>
  <p><strong>Geilton Xavier</strong> currently works at <a href="https://www.siemens.com/pt/pt.html"><strong>Siemens</strong></a>.</p>
  <p>His most recent roles were at <a href="https://www.edenred.com.br/"><strong>Edenred</strong></a>, <a href="https://www.fidelidade.pt/"><strong>Fidelidade</strong></a> and <a href="https://www.prodesp.sp.gov.br/"><strong>Prodesp</strong></a>.</p>
</div>
{{< /rawhtml >}}
"""

singleDateFormat = '2 Jan 2006'

# Collection to display on home
# homeCollectionTitle = 'Posts'
# homeCollection = 'posts'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '02 Jan 2006'
listSummaryLength = 220

# Footer
showFooter = false

# Breadcrumbs
[params.breadcrumbs]
enabled = true
showCurrentPage = true
home = "~"

# Social icons
[[params.social]]
name = "linkedin"
url = "https://www.linkedin.com/in/geiltonxavier/"

[[params.social]]
name = "github"
url = "https://github.com/geiltonxavier"

# Main menu pages
# [[params.menu]]
# name = "home"
# url = "/"

[[params.menu]]
name = "posts"
url = "/posts"

[[params.menu]]
name = "about"
url = "/about"

[[params.menu]]
name = "cv"
url = "https://github.com/geiltonxavier/cv/blob/main/geilton-xavier-resume-en.pdf"


# [[params.menu]]
# name = "tags"
# url = "/tags"


# Syntax highlight on code blocks
[markup]
[markup.highlight]
style = 'bw'

# Deploy settings

[[deployment.matchers]]
pattern = "^.+\\.(js|css|svg|ttf|woff2)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = true

[[deployment.matchers]]
pattern = "^.+\\.(png|jpg|gif|webp)$"
cacheControl = "max-age=31536000, no-transform, public"
gzip = false

